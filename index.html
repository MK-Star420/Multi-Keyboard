<heat>
  <link rel="manifest" href="manifest.json">
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.app{background:#0f0c1e;min-height:100vh;display:flex;flex-direction:column;font-family:'Noto Naskh Arabic',sans-serif;color:#fff;}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:9px 14px 3px;font-size:12px;color:rgba(255,255,255,0.5);}
.seg{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);}
.seg-btn{flex:1;padding:7px 4px;border:none;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.38);font-size:12px;cursor:pointer;font-family:inherit;transition:all .14s;}
.seg-btn.active.urdu{background:linear-gradient(135deg,#6d28d9,#4c1d95);color:#fff;font-weight:500;}
.seg-btn.active.arabic{background:linear-gradient(135deg,#065f46,#047857);color:#fff;font-weight:500;}
.seg-btn.active.layout{background:rgba(255,255,255,0.15);color:#fff;font-weight:500;}
.top-row{display:flex;gap:8px;padding:8px 12px 4px;align-items:center;}
.lang-seg{flex:2;}
.layout-seg{flex:1;}
.text-area-wrap{padding:6px 12px 4px;display:flex;flex-direction:column;gap:4px;}
.text-label{font-size:9px;letter-spacing:1.3px;text-transform:uppercase;color:rgba(255,255,255,0.25);}
.text-display{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:13px;padding:10px 13px;min-height:76px;font-size:19px;line-height:2;color:#fff;direction:rtl;text-align:right;word-break:break-word;}
.text-display.uf{font-family:'Noto Nastaliq Urdu',serif;line-height:2.3;}
.text-display.af{font-family:'Noto Naskh Arabic',serif;}
.cursor{display:inline-block;width:2px;height:1em;vertical-align:middle;margin-right:1px;animation:blink 1s steps(1) infinite;}
.cursor.uc{background:#a78bfa;}.cursor.ac{background:#34d399;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.char-count{font-size:10px;color:rgba(255,255,255,0.2);text-align:left;}
.action-row{display:flex;gap:5px;padding:3px 12px 4px;}
.abtn{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:rgba(255,255,255,0.6);font-size:11px;padding:6px 3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;font-family:inherit;transition:background .1s,transform .07s;}
.abtn:active{transform:scale(0.93);}
.abtn.cp{color:#a78bfa;border-color:rgba(167,139,250,0.3);}
.abtn.cl{color:#f87171;border-color:rgba(248,113,113,0.25);}
.abtn.sh{color:#60a5fa;border-color:rgba(96,165,250,0.25);}
.kbd-wrap{background:rgba(8,6,22,0.93);border-top:1px solid rgba(255,255,255,0.07);padding:6px 4px 11px;flex:1;}
.mode-tabs{display:flex;gap:2px;padding:0 3px 5px;}
.mtab{flex:1;background:transparent;border:none;border-radius:6px;color:rgba(255,255,255,0.3);font-size:10px;padding:4px 2px;cursor:pointer;transition:all .14s;font-family:inherit;}
.mtab.active{background:rgba(255,255,255,0.1);color:#fff;}
.sug-row{display:flex;gap:4px;padding:0 3px 5px;overflow-x:auto;scrollbar-width:none;}
.sug-row::-webkit-scrollbar{display:none;}
.sug{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:rgba(255,255,255,0.85);font-size:14px;padding:3px 9px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.sug:active{background:rgba(255,255,255,0.2);}
.sug.uf{font-family:'Noto Nastaliq Urdu',serif;font-size:15px;}
.sug.af{font-family:'Noto Naskh Arabic',serif;}
.key-rows{display:flex;flex-direction:column;gap:4px;}
.krow{display:flex;justify-content:center;gap:3px;direction:rtl;}
.k{background:rgba(255,255,255,0.1);border:none;border-bottom:2px solid rgba(0,0,0,0.35);border-radius:7px;color:#fff;font-size:15px;min-width:0;height:40px;flex:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .07s,transform .06s;user-select:none;-webkit-user-select:none;padding:0 1px;font-family:'Noto Naskh Arabic',serif;}
.k:active{background:rgba(255,255,255,0.3);transform:scale(0.87);}
.k.uf{font-family:'Noto Nastaliq Urdu',serif;font-size:16px;}
.k.lg{font-size:11px;max-width:none;flex:2;font-family:'Noto Nastaliq Urdu',serif;}
.k.lg.af{font-family:'Noto Naskh Arabic',serif;}
.k.sp{background:rgba(255,255,255,0.05);font-family:inherit;font-size:11px;color:rgba(255,255,255,0.42);max-width:none;}
.k.space{flex:4;max-width:none;font-family:inherit;font-size:11px;color:rgba(255,255,255,0.38);}
.k.bk{flex:1.4;max-width:none;font-size:14px;color:#f87171;background:rgba(248,113,113,0.08);font-family:inherit;}
.k.en{flex:1.4;max-width:none;font-size:13px;color:#34d399;background:rgba(52,211,153,0.08);font-family:inherit;}
.k.hk{font-size:18px;color:#fbbf24;background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.15);flex-direction:column;height:46px;gap:0;}
.hk-label{font-size:8px;color:rgba(251,191,36,0.6);font-family:sans-serif;line-height:1.1;}
.layout-badge{display:flex;align-items:center;justify-content:center;padding:2px 0 3px;gap:6px;}
.lbadge{font-size:9px;letter-spacing:.8px;color:rgba(255,255,255,0.22);text-transform:uppercase;}
.lbadge.on{color:#a78bfa;}
.tip{font-size:10px;color:rgba(255,255,255,0.2);text-align:center;padding:3px 0 0;letter-spacing:0.3px;}
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.85);background:rgba(52,211,153,0.92);color:#fff;padding:8px 16px;border-radius:11px;font-size:13px;opacity:0;pointer-events:none;transition:all .2s;z-index:99;font-family:inherit;}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
</style>

<div class="app" id="app">
  <div class="status-bar">
    <span id="clock">--:--</span>
    <span id="lang-ind" style="font-size:13px;letter-spacing:1px;">اردو</span>
    <span>▋▋▋ WiFi</span>
  </div>

  <div class="top-row">
    <div class="seg lang-seg">
      <button class="seg-btn urdu active" id="btn-ur" onclick="switchLang('ur')">اردو Urdu</button>
      <button class="seg-btn arabic" id="btn-ar" onclick="switchLang('ar')">عربي Arabic</button>
    </div>
    <div class="seg layout-seg">
      <button class="seg-btn layout active" id="btn-alpha" onclick="switchLayout('alpha')">أ ب ت</button>
      <button class="seg-btn layout" id="btn-qwerty" onclick="switchLayout('qwerty')">QWERTY</button>
    </div>
  </div>

  <div class="text-area-wrap">
    <div class="text-label" id="txt-label">Urdu Composer</div>
    <div class="text-display uf" id="display">
      <span id="typed"></span><span class="cursor uc" id="cur"></span>
    </div>
    <div class="char-count" id="char-count">0 حروف</div>
  </div>

  <div class="action-row">
    <button class="abtn cp" onclick="copyText()"><i class="ti ti-copy" style="font-size:13px"></i> Copy</button>
    <button class="abtn sh" onclick="shareText()"><i class="ti ti-share" style="font-size:13px"></i> Share</button>
    <button class="abtn cl" onclick="clearText()"><i class="ti ti-trash" style="font-size:13px"></i> Clear</button>
  </div>

  <div class="kbd-wrap">
    <div class="mode-tabs" id="mode-tabs"></div>
    <div class="sug-row" id="sug-row"></div>
    <div class="key-rows" id="key-rows"></div>

  <div class="toast" id="toast"></div>
</div>

const LANGCFG = {
  ur:{ fk:'uf', fd:'uf', cc:'uc', label:'Urdu Composer', ind:'اردو', tip:'', spaceLabel:'اسپیس',
    suggestions:['آپ','ہم','کیا','نہیں','ہے','میں','اور','کہ','یہ','وہ','ہاں','نہ','بھی','تو','سے'] },
  ar:{ fk:'af', fd:'af', cc:'ac', label:'Arabic Composer', ind:'عربي',
    tip:'الحركات تُضاف بعد الحرف — tap a letter first, then add harakat', spaceLabel:'مسافة',
    suggestions:['أنت','نحن','ما','لا','هو','هي','في','من','إلى','على','كان','قال','الله','هذا'] }
};

const SUGMAP = {
  ur:{'آ':['آپ','آج','آسمان','آواز'],'ک':['کیا','کہ','کام','کتاب'],'م':['میں','مجھے','محبت','مدد'],'ہ':['ہے','ہیں','ہاں','ہو'],'ن':['نہیں','نام','نیا','نور'],'ں':['ہیں','تھیں','کریں','لیں']},
  ar:{'أ':['أنت','أنا','أهل'],'ك':['كيف','كان','كل'],'م':['ما','من','مع','ماذا'],'ل':['لا','لكن','لله'],'ه':['هو','هي','هذا']}
};

let lang='ur', layout='alpha', mode='letters', text='';
let cfg=LANGCFG.ur;

function switchLang(l){
  lang=l; cfg=LANGCFG[l]; mode='letters';
  document.getElementById('btn-ur').classList.toggle('active',l==='ur');
  document.getElementById('btn-ar').classList.toggle('active',l==='ar');
  const disp=document.getElementById('display');
  disp.className='text-display '+cfg.fd;
  document.getElementById('cur').className='cursor '+cfg.cc;
  document.getElementById('txt-label').textContent=cfg.label;
  document.getElementById('lang-ind').textContent=cfg.ind;
  document.getElementById('tip').textContent=cfg.tip;
  renderAll();
}

function switchLayout(l){
  layout=l; mode='letters';
  document.getElementById('btn-alpha').classList.toggle('active',l==='alpha');
  document.getElementById('btn-qwerty').classList.toggle('active',l==='qwerty');
  renderAll();
}

function getModes(){ return LAYOUTS[lang][layout]; }

function renderAll(){ renderTabs(); renderSuggestions(); renderKeys(); }

function renderTabs(){
  const el=document.getElementById('mode-tabs'); el.innerHTML='';
  const modes=getModes();
  Object.keys(modes).forEach(k=>{
    const b=document.createElement('button');
    b.className='mtab'+(k===mode?' active':'');
    b.textContent=modes[k].label;
    b.onclick=()=>{mode=k;renderTabs();renderKeys();};
    el.appendChild(b);
  });
}

function renderSuggestions(){
  const row=document.getElementById('sug-row'); row.innerHTML='';
  cfg.suggestions.forEach(w=>{
    const d=document.createElement('div');
    d.className='sug '+cfg.fk; d.textContent=w;
    d.onclick=()=>{
      if(text.length&&text[text.length-1]!==' ')text+=' ';
      text+=w+' '; update();
    };
    row.appendChild(d);
  });
}

function renderKeys(){
  const container=document.getElementById('key-rows'); container.innerHTML='';
  const mdata=getModes()[mode];
  if(!mdata) return;
  const rows=mdata.rows, isH=mdata.isHarakat||false;

  rows.forEach(row=>{
    const div=document.createElement('div'); div.className='krow';
    row.forEach(item=>{
      const btn=document.createElement('button');
      if(isH&&typeof item==='object'){
        btn.className='k hk';
        const top=document.createElement('span');
        top.style.cssText='font-family:Noto Naskh Arabic,serif;font-size:18px;';
        top.textContent=item.c;
        const lbl=document.createElement('span');
        lbl.className='hk-label'; lbl.textContent=item.h;
        btn.appendChild(top); btn.appendChild(lbl);
        btn.onclick=()=>pressH(item.v);
      } else {
        const ch=typeof item==='object'?item.c:item;
        const isLong=ch.length>3;
        if(isLong){
          btn.className='k lg '+(lang==='ar'?'af':'');
          btn.style.flex='2'; btn.style.fontSize='11px';
        } else {
          btn.className='k '+cfg.fk;
        }
        btn.textContent=ch;
        btn.onclick=()=>press(ch);
      }
      div.appendChild(btn);
    });
    container.appendChild(div);
  });

  const brow=document.createElement('div'); brow.className='krow';
  const bk=document.createElement('button');
  bk.className='k bk'; bk.textContent='⌫'; bk.onclick=backspace;
  const sp=document.createElement('button');
  sp.className='k space'; sp.textContent=cfg.spaceLabel; sp.onclick=()=>press(' ');
  const en=document.createElement('button');
  en.className='k en'; en.textContent='↵'; en.onclick=()=>press('\n');
  brow.appendChild(bk); brow.appendChild(sp); brow.appendChild(en);
  container.appendChild(brow);
}

function press(ch){ text+=ch; update(); dynSug(ch); }

function pressH(v){
  if(!text.length) return;
  const arr=[...text], last=arr[arr.length-1];
  if(last&&last!==' '&&last!=='\n') arr.splice(arr.length-1,0,v);
  else arr.push(v);
  text=arr.join(''); update();
}

function backspace(){
  const arr=[...text];
  if(arr.length){arr.pop();text=arr.join('');update();}
}

function update(){
  document.getElementById('typed').textContent=text;
  const n=[...text].filter(c=>c!==' '&&c!=='\n').length;
  document.getElementById('char-count').textContent=n+(lang==='ur'?' حروف':' أحرف');
}

function clearText(){ text=''; update(); }

function copyText(){
  if(navigator.clipboard&&text) navigator.clipboard.writeText(text).catch(()=>{});
  showToast('✓ Copied!');
}

function shareText(){
  if(navigator.share&&text) navigator.share({text}).catch(()=>{});
  else showToast('📋 Ready to share!');
}

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function dynSug(ch){
  const map=SUGMAP[lang];
  if(map&&map[ch]){
    const row=document.getElementById('sug-row'); row.innerHTML='';
    map[ch].forEach(w=>{
      const d=document.createElement('div');
      d.className='sug '+cfg.fk; d.textContent=w;
      d.onclick=()=>{
        const parts=text.split(/\s/); parts.pop();
        text=parts.join(' ')+(parts.length?' ':'')+w+' '; update();
      };
      row.appendChild(d);
    });
  }
}

function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
